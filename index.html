    <!-- Tailwind 及自定义配置、字体、样式 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'industrial-dark': '#1a1a1a',
                        'industrial-gray': '#2d2d2d',
                        'industrial-light': '#404040',
                        'industrial-accent': '#ff6b35',
                        'industrial-blue': '#4a9eff',
                        'industrial-green': '#00d084',
                        'industrial-yellow': '#ffb800',
                        'industrial-red': '#ff4757'
                    },
                    fontFamily: {
                        'industrial': ['Orbitron', 'monospace', 'sans-serif']
                    },
                    boxShadow: {
                        'industrial': '0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2)',
                        'industrial-inset': 'inset 0 2px 4px 0 rgba(0, 0, 0, 0.3)'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        .industrial-panel {
            background: linear-gradient(145deg, #2d2d2d, #1a1a1a);
            border: 1px solid #404040;
        }
        .industrial-button {
            background: linear-gradient(145deg, #404040, #2d2d2d);
            border: 1px solid #555;
            transition: all 0.2s ease;
        }
        .industrial-button:hover {
            background: linear-gradient(145deg, #4a4a4a, #333);
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
        }
        .industrial-button:active {
            transform: translateY(0);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        .building-card-industrial {
            background: linear-gradient(145deg, #333, #1a1a1a);
            border: 1px solid #555;
            transition: all 0.3s ease;
        }
        .building-card-industrial:hover {
            background: linear-gradient(145deg, #404040, #2d2d2d);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
        }
        .building-card-industrial.selected {
            border-color: #ff6b35;
            box-shadow: 0 0 0 2px #ff6b35;
        }
        .resource-display {
            background: linear-gradient(145deg, #1a1a1a, #0d0d0d);
            border: 1px solid #333;
        }
        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        .status-online { background-color: #00d084; }
        .status-warning { background-color: #ffb800; }
        .status-error { background-color: #ff4757; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .industrial-grid {
            background-image: 
                linear-gradient(rgba(64, 64, 64, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(64, 64, 64, 0.3) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .neon-text {
            text-shadow: 0 0 5px currentColor, 0 0 10px currentColor, 0 0 15px currentColor;
        }
        .dashboard-card {
            background: linear-gradient(145deg, #2d2d2d, #1a1a1a);
            border: 1px solid #404040;
            position: relative;
            overflow: hidden;
        }
        .dashboard-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff6b35, transparent);
        }
    </style>
  </head>
  <body class="bg-industrial-dark text-gray-100 min-h-screen font-industrial">

    <!-- Loading 全屏 进度 -->
    <div id="loading-screen" class="fixed inset-0 z-[9999] flex flex-col items-center justify-center bg-gray-900">
      <div class="w-64 space-y-4">
        <div class="text-center">
          <h2 class="text-xl font-semibold text-white mb-2">Loading Resources</h2>
          <p id="loading-percentage" class="text-gray-400">0%</p>
        </div>
        <div class="relative h-2 bg-gray-700 rounded-full overflow-hidden">
          <div id="loading-bar" class="absolute left-0 top-0 h-full w-0 bg-blue-500 transition-all duration-300 ease-out"></div>
        </div>
      </div>
    </div>
    <noscript class="text-center text-lg text-red-500">
      Enable JavaScript to enjoy all the features of this app.
    </noscript>
    <main class="flex h-full text-color" style="background: radial-gradient(ellipse at center, #6990b8 0%, #3b5279 100%);">
      <canvas id="canvas" class="z-[0] h-full w-full"></canvas>
      <div id="info-panel" class="absolute z-40 top-4 right-4 p-4 bg-white rounded-lg shadow-lg"></div>
    </main>

    <script type="module" src="src/js/index.js"></script>
  </body>
